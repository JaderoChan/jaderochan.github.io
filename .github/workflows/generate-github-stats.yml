name: Generate GitHub Stats JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'
  push:
    branches:
      - main
    paths:
      - scripts/generate-github-stats.mjs
      - .github/workflows/generate-github-stats.yml
      - script.js

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate stats JSON
        env:
          GITHUB_OWNER: JaderoChan
          GITHUB_USER: JaderoChan
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-github-stats.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh github stats snapshot"
          git push
