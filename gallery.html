<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery · 頔珞 JaderoChan Website</title>
  <meta name="description" content="Photo gallery of JaderoChan in masonry layout." />
  <link rel="icon" href="https://github.com/JaderoChan.png" type="image/png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <div class="container nav">
      <div class="nav-primary">
        <a class="brand" href="./index.html">頔珞 JaderoChan Website</a>
        <nav class="nav-links" aria-label="Primary">
          <a class="nav-link" href="./index.html"><span class="zh">主页</span><span class="en lang-hidden">Home</span></a>
          <a class="nav-link" href="./base.html"><span class="zh">基</span><span class="en lang-hidden">Base</span></a>
          <a class="nav-link nav-link-active" href="./gallery.html"><span class="zh">画廊</span><span class="en lang-hidden">Gallery</span></a>
        </nav>
      </div>
      <div class="controls">
        <button id="langBtn">中 / EN</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="subpage-hero gallery-hero">
      <p class="eyebrow">Visual Archive</p>
      <h1 class="title title-small"><span class="zh">画廊</span><span class="en lang-hidden">Gallery</span></h1>
    </section>

    <section>
      <div id="galleryMasonry" class="gallery-masonry"></div>
    </section>
  </main>

  <div id="galleryLightbox" class="gallery-lightbox" aria-hidden="true">
    <button id="lightboxClose" class="gallery-lightbox-close" type="button" aria-label="Close">×</button>
    <img id="lightboxImage" class="gallery-lightbox-image" alt="" />
    <p id="lightboxCaption" class="gallery-lightbox-caption"></p>
  </div>

  <footer class="container">
    <span class="zh">© <span id="year"></span> JaderoChan · 由 GitHub Pages 部署</span>
    <span class="en lang-hidden">© <span id="year2"></span> JaderoChan · Powered by GitHub Pages</span>
  </footer>

  <script src="./gallery.js"></script>
</body>
</html>
